apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cardshop
  labels:
    app: dropbox-app
  name: dropbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dropbox-app
  template:
    metadata:
      labels:
        app: dropbox-app
    spec:
      containers:
      - image: ghcr.io/kiwix/dropbox:latest
        imagePullPolicy: Always
        name: dropbox
        env:
          - name: USERS
            valueFrom:
              configMapKeyRef:
                name: dropbox-pubkeys
                key: users
                optional: false
        volumeMounts:
        - name: bundles-volume
          subPath: "files"
          mountPath: "/jails/cs-worker/data/content-bundles"
          readOnly: false
        - name: host-keys
          subPath: ecdsa
          mountPath: "/etc/ssh/ssh_host_ecdsa_key"
          readOnly: true
        - name: host-pubkeys
          subPath: ecdsa
          mountPath: "/etc/ssh/ssh_host_ecdsa_key.pub"
          readOnly: true
        - name: host-keys
          subPath: ed25519
          mountPath: "/etc/ssh/ssh_host_ed25519_key"
          readOnly: true
        - name: host-pubkeys
          subPath: ed25519
          mountPath: "/etc/ssh/ssh_host_ed25519_key.pub"
          readOnly: true
        - name: host-keys
          subPath: rsa
          mountPath: "/etc/ssh/ssh_host_rsa_key"
          readOnly: true
        - name: host-pubkeys
          subPath: rsa
          mountPath: "/etc/ssh/ssh_host_rsa_key.pub"
          readOnly: true
        ports:
          - containerPort: 22
        resources:
          requests:
            memory: "512Mi"
            cpu: "2000m"
      volumes:
      - name: bundles-volume
        persistentVolumeClaim:
          claimName: hotspot-dl-content-bundles-pvc
      - name: host-keys
        secret:
          secretName: dropbox-host-keys
          defaultMode: 0600
      - name: host-pubkeys
        configMap:
          name: dropbox-host-pubkeys
          defaultMode: 0644
      nodeSelector:
        k8s.kiwix.org/role: "hotspot-dl"
---
apiVersion: v1
kind: Service
metadata:
  namespace: cardshop
  name: dropbox-service
  labels:
    app: dropbox-app
spec:
  type: NodePort
  selector:
    app: dropbox-app
  ports:
  - protocol: TCP
    port: 30070
    targetPort: 22
    nodePort: 30070
