apiVersion: v1
kind: PersistentVolume
metadata:
  name: srv-b-other-local-pv
spec:
  capacity:
    # content is ~40GB ATM (Apr 2026)
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /data/download/other/
  claimRef:
    name: browser-other-pvc
    namespace: zim
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: k8s.kiwix.org/role
              operator: In
              values:
              - browser
