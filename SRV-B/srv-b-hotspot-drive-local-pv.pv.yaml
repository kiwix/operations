apiVersion: v1
kind: PersistentVolume
metadata:
  name: srv-b-hotspot-drive-local-pv
spec:
  capacity:
    storage: 100Mi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /data/hotspot-drive
  claimRef:
    name: browser-hotspot-drive-pvc
    namespace: offspot
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: k8s.kiwix.org/role
              operator: In
              values:
              - browser
