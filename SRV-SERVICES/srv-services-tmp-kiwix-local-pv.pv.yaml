apiVersion: v1
kind: PersistentVolume
metadata:
  name: srv-services-tmp-kiwix-local-pv
spec:
  capacity:
    # content is 40GB ATM (April 2026)
    storage: 100Gi
  volumeMode: Filesystem
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /data/tmp-kiwix
  claimRef:
    name: services-tmp-kiwix-pvc
    namespace: zim
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: k8s.kiwix.org/role
              operator: In
              values:
              - services
