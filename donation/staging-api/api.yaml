apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: donation
  labels:
    app: staging-api-app
  name: staging-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staging-api-app
  template:
    metadata:
      labels:
        app: staging-api-app
    spec:
      containers:
      - image: ghcr.io/kiwix/donation-portal:latest
        imagePullPolicy: Always
        name: ui
        envFrom:
        - configMapRef:
            name: staging-api-configs
        - secretRef:
            name: staging-api-secrets
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
      nodeSelector:
        k8s.kiwix.org/role: "services"
---
apiVersion: v1
kind: Service
metadata:
  namespace: donation
  name: staging-api-service
  labels:
    app: staging-api-app
spec:
  selector:
    app: staging-api-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: staging-api-ingress
  namespace: donation
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
    - hosts:
      - api.donation.kiwix.org
      secretName: staging-api-donation-kiwix-org-tls
  rules:
  - host: staging.api.donation.kiwix.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: staging-api-service
            port:
              number: 80
