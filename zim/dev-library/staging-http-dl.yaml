apiVersion: v1
kind: ConfigMap
metadata:
  name: staging-http-dl-configs
  namespace: zim
data:
  vhost.conf: |
    server {
      listen 80;
      server_name _;
      access_log off;
      root /var/www;
      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime off;
      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }
      location = /favicon.ico {
        log_not_found off;
      }
      location = /zim {
        add_header "Content-Disposition" "attachment";
        etag on;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: staging-http-dl-app
  name: staging-http-dl-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staging-http-dl-app
  template:
    metadata:
      labels:
        app: staging-http-dl-app
    spec:
      securityContext:
      containers:
      - image: docker.io/library/nginx:mainline
        imagePullPolicy: IfNotPresent
        name: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/var/www/zim"
          name: zim-volume
        - name: configs
          mountPath: "/etc/nginx/conf.d/default.conf"
          subPath: vhost.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/mime.types"
          subPath: mime.types
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/gzip.conf"
          subPath: gzip.conf
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "1m"
          limits:
            memory: "1Gi"
            cpu: "2"
      volumes:
      - name: zim-volume
        persistentVolumeClaim:
          claimName: browser-hidden-pvc
      - name: configs
        configMap:
          name: staging-http-dl-configs
      - name: nginx-configs
        configMap:
          name: nginx-configs
      nodeSelector:
        k8s.kiwix.org/role: "browser"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: staging-http-dl-service
  labels:
    app: staging-http-dl-app
spec:
  selector:
    app: staging-http-dl-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: staging-http-dl-ingress
  namespace: zim
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - staging.download.kiwix.org
      secretName: staging-download-kiwix-org-tls
  rules:
  - host: staging.download.kiwix.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: staging-http-dl-service
            port:
              number: 80
