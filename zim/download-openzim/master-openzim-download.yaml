apiVersion: v1
kind: ConfigMap
metadata:
  name: master-openzim-configs
  namespace: zim
data:
  vhost.conf: |
    map_hash_max_size 2048;
    map_hash_bucket_size 256;
    map $uri $redirect_uri {
        include /data/maps/openzim-releases.map;
        include /data/maps/openzim-nightly.map;
    }

    server {
      listen 80;
      server_name _;
      access_log /var/log/nginx/access.log vhost;
      access_log /dev/stdout vhost;
      root /var/www;
      default_type application/octet-stream;
      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime off;
      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }

      location / {
        if ($redirect_uri) {
          add_header Cache-Control "no-store, no-cache, must-revalidate";
          rewrite ^ https://$host$redirect_uri permanent;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: master-openzim-app
  name: master-openzim-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-openzim-app
  template:
    metadata:
      labels:
        app: master-openzim-app
    spec:
      shareProcessNamespace: true
      containers:
      - image: docker.io/library/bash:5-alpine3.15
        imagePullPolicy: IfNotPresent
        name: reloader
        # reload nginx config every hour at *:10
        command: ["crond", "-f"]
        securityContext:
          capabilities:
            add:
            - SYS_PTRACE
        volumeMounts:
        - name: nginx-configs-scripts
          mountPath: "/usr/bin/reload-nginx"
          subPath: reload-nginx.sh
          readOnly: true
        - name: nginx-configs-scripts
          mountPath: "/etc/crontabs/root"
          subPath: reload-nginx.crontab
          readOnly: true
      - image: docker.io/nginx:1.21
        imagePullPolicy: IfNotPresent
        name: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/var/www/wp1"
          name: empty-volume
          readOnly: true
        - mountPath: "/data/maps"
          name: maps-volume
          readOnly: true
        - mountPath: "/var/www/release"
          name: openzim-release-volume
          readOnly: true
        - mountPath: "/var/www/nightly"
          name: openzim-nightly-volume
          readOnly: true
        - mountPath: "/var/log/nginx"
          subPath: download-openzim
          name: nginx-logs-volume
          readOnly: false
        - name: configs
          mountPath: "/var/www/README"
          subPath: README
          readOnly: true
        - name: configs
          mountPath: "/etc/nginx/conf.d/default.conf"
          subPath: vhost.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/mime.types"
          subPath: mime.types
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/gzip.conf"
          subPath: gzip.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/01vhost-logfmt.conf"
          subPath: vhost-logfmt.conf
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: empty-volume
        emptyDir:
          medium: Memory
      - name: openzim-release-volume
        persistentVolumeClaim:
          claimName: master-openzim-release-pvc
      - name: openzim-nightly-volume
        persistentVolumeClaim:
          claimName: master-openzim-nightly-pvc
      - name: nginx-logs-volume
        persistentVolumeClaim:
          claimName: master-www-logs-pvc
      - name: maps-volume
        persistentVolumeClaim:
          claimName: master-maps-pvc
      - name: configs
        configMap:
          name: master-openzim-configs
      - name: nginx-configs
        configMap:
          name: nginx-configs
      - name: nginx-configs-scripts
        configMap:
          name: nginx-configs
          defaultMode: 0755
      nodeSelector:
        k8s.kiwix.org/role: "master"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: master-openzim-service
  labels:
    app: master-openzim-app
spec:
  selector:
    app: master-openzim-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master-openzim-ingress
  namespace: zim
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      # kiwix-js requests
      add_header Access-Control-Allow-Origin *;
      gzip on;
      gzip_types
        application/atom+xml
        application/javascript
        application/x-javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml
        text/x-component;

      location /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /";
      }

      rewrite ^/wp1/(.*) https://wp1.download.openzim.org/$1 permanent;
      rewrite ^/$ https://hub.kiwix.org/downloads/ permanent;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - download.openzim.org
      secretName: download-openzim-org-tls
  rules:
  - host: download.openzim.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: master-openzim-service
            port:
              number: 80
