apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: browser-receiver-app
  name: browser-receiver-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: browser-receiver-app
  template:
    metadata:
      labels:
        app: browser-receiver-app
    spec:
      containers:
      - image: ghcr.io/openzim/zimfarm-receiver:latest
        imagePullPolicy: Always
        name: receiver
        volumeMounts:
        - name: receiver-volume
          subPath: "logs"
          mountPath: "/jail/logs"
          readOnly: false
        - name: receiver-volume
          subPath: "zim"
          mountPath: "/jail/zim"
          readOnly: false
        - name: receiver-volume
          subPath: "quarantine"
          mountPath: "/mnt/quarantine"
        - name: receiver-volume
          subPath: "check-logs"
          mountPath: "/mnt/check_logs"
          readOnly: false
        - name: hidden-volume
          mountPath: "/mnt/zim/.hidden"
          readOnly: false
        - name: zim-volume
          mountPath: "/mnt/zim"
          readOnly: false
          # chown -R 999:100 zim/
        env:
        - name: ENABLE_ZIM_MOVE
          value: "0"
        ports:
          - containerPort: 22
        resources:
          requests:
            memory: "32Mi"
            cpu: "500m"
      volumes:
      - name: zim-volume
        persistentVolumeClaim:
          claimName: browser-zim-pvc
      - name: hidden-volume
        persistentVolumeClaim:
          claimName: browser-hidden-pvc
      - name: receiver-volume
        persistentVolumeClaim:
          claimName: browser-receiver-pvc
      nodeSelector:
        k8s.kiwix.org/role: "browser"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: browser-receiver-service
  labels:
    app: browser-receiver-app
spec:
  type: NodePort
  selector:
    app: browser-receiver-app
  ports:
  - protocol: TCP
    port: 30222
    targetPort: 22
    nodePort: 30222
