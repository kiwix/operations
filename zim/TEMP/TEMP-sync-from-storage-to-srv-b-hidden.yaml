apiVersion: batch/v1
kind: CronJob
metadata:
  name: temp-sync-from-storage-to-srv-b-hidden
  namespace: zim
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: debian
              image: ghcr.io/kiwix/maintenance:latest
              imagePullPolicy: Always
              volumeMounts:
              - mountPath: "/data/hidden"
                name: hidden-volume
                readOnly: false
              args: ["rsync", "--verbose", "--compress", "--recursive", "--links", "--perms", "--times", "--devices", "--specials", "--delete", "--progress", "rsyncd-service::hidden/", "/data/hidden/"]
              resources:
                limits:
                  cpu: 200m
                  memory: 512Mi
          volumes:
          - name: hidden-volume
            persistentVolumeClaim:
              claimName: browser-hidden-pvc
          restartPolicy: Never
          nodeSelector:
            k8s.kiwix.org/role: "browser"
