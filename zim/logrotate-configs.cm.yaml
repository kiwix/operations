apiVersion: v1
kind: ConfigMap
metadata:
  name: logrotate-configs
  namespace: zim
data:
  logrotate.conf: |
    copytruncate
    daily
    dateext
    compress
    delaycompress
    ifempty
    rotate 30
    maxage 30
    missingok
    nomail
    include /etc/logrotate.d
  mirror-download-kiwix.conf: |
    /data/nginx-logs/mirror-download-kiwix/*.log {
      olddir /data/nginx-logs/archives/mirror-download-kiwix
    }
  download-kiwix.conf: |
    /data/nginx-logs/download-kiwix/*.log {
      olddir /data/nginx-logs/archives/download-kiwix
    }
  download-openzim.conf: |
    /data/nginx-logs/download-openzim/*.log {
      olddir /data/nginx-logs/archives/download-openzim
    }
  lb-download-kiwix.conf: |
    /data/nginx-logs/lb-download-kiwix/*.log {
      olddir /data/nginx-logs/archives/lb-download-kiwix
    }
  library-kiwix.conf: |
    /data/nginx-logs/library-kiwix/*.log {
      olddir /data/nginx-logs/archives/library-kiwix
    }
  opds-library-kiwix.conf: |
    /data/nginx-logs/opds-library-kiwix/*.log {
      olddir /data/nginx-logs/archives/opds-library-kiwix
    }
  browse-library-kiwix.conf: |
    /data/nginx-logs/browse-library-kiwix/*.log {
      olddir /data/nginx-logs/archives/browse-library-kiwix
    }
  demo-library-kiwix.conf: |
    /data/nginx-logs/demo-library-kiwix/*.log {
      olddir /data/nginx-logs/archives/demo-library-kiwix
    }
  wp1-download-openzim.conf: |
    /data/nginx-logs/wp1-download-openzim/*.log {
      olddir /data/nginx-logs/archives/wp1-download-openzim
    }
