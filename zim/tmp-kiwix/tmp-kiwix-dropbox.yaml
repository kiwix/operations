apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: tmp-kiwix-dropbox-app
  name: tmp-kiwix-dropbox-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tmp-kiwix-dropbox-app
  template:
    metadata:
      labels:
        app: tmp-kiwix-dropbox-app
    spec:
      containers:
      - image: ghcr.io/kiwix/dropbox:latest
        imagePullPolicy: Always
        name: dropbox
        env:
          - name: USERS
            valueFrom:
              configMapKeyRef:
                name: dropbox-pubkeys
                key: users
                optional: false
        volumeMounts:
        # chmod -R 2777 /data/tmp-kiwix/
        - name: tmp-kiwix-volume
          mountPath: "/jails/kiwix-build/data/tmp"
          readOnly: false
        - name: tmp-kiwix-volume
          mountPath: "/jails/reg/data/tmp"
          readOnly: false
        - name: tmp-kiwix-volume
          mountPath: "/jails/benoit/data/tmp"
          readOnly: false
        - name: tmp-kiwix-volume
          mountPath: "/jails/levon/data/tmp"
          readOnly: false

        # keys
        - name: host-keys
          subPath: ecdsa
          mountPath: "/etc/ssh/ssh_host_ecdsa_key"
          readOnly: true
        - name: host-pubkeys
          subPath: ecdsa
          mountPath: "/etc/ssh/ssh_host_ecdsa_key.pub"
          readOnly: true
        - name: host-keys
          subPath: ed25519
          mountPath: "/etc/ssh/ssh_host_ed25519_key"
          readOnly: true
        - name: host-pubkeys
          subPath: ed25519
          mountPath: "/etc/ssh/ssh_host_ed25519_key.pub"
          readOnly: true
        - name: host-keys
          subPath: rsa
          mountPath: "/etc/ssh/ssh_host_rsa_key"
          readOnly: true
        - name: host-pubkeys
          subPath: rsa
          mountPath: "/etc/ssh/ssh_host_rsa_key.pub"
          readOnly: true
        ports:
          - containerPort: 22
        resources:
          requests:
            memory: "20Mi"
            cpu: "200m"
      volumes:
      - name: tmp-kiwix-volume
        persistentVolumeClaim:
          claimName: services-tmp-kiwix-pvc
      - name: host-keys
        secret:
          secretName: dropbox-host-keys
          defaultMode: 0600
      - name: host-pubkeys
        configMap:
          name: dropbox-host-pubkeys
          defaultMode: 0644
      nodeSelector:
        k8s.kiwix.org/role: "services"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: tmp-kiwix-dropbox-service
  labels:
    app: tmp-kiwix-dropbox-app
spec:
  type: NodePort
  selector:
    app: tmp-kiwix-dropbox-app
  ports:
  - protocol: TCP
    port: 30522
    targetPort: 22
    nodePort: 30522
