apiVersion: v1
kind: ConfigMap
metadata:
  name: master-mirror-configs
  namespace: zim
data:
  vhost.conf: |
    map_hash_max_size 2048;
    map_hash_bucket_size 256;
    map $uri $redirect_uri {
        include /data/maps/kiwix-releases.map;
        include /data/maps/kiwix-nightly.map;
    }

    server {
      listen 80;
      server_name _;
      access_log /var/log/nginx/access.log vhost;
      access_log /dev/stdout vhost;
      root /var/www;
      default_type application/octet-stream;
      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime off;

      gzip on;
      gzip_types
        application/atom+xml
        application/javascript
        application/x-javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml
        text/x-component;

      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }
      location = /README {
        types { } default_type "text/plain; charset=utf-8";
      }
      location = /mirrors.html {
        types { } default_type "text/html; charset=utf-8";
      }

      location /zim {
        autoindex off;
      }

      location / {
        if ($redirect_uri) {
          add_header Cache-Control "no-store, no-cache, must-revalidate";
          rewrite ^ https://$host$redirect_uri permanent;
        }
      } 
    }
  README: |
    mirror.download.kiwix.org: Kiwix's own download mirror.

    /!\ This mirror's main purpose is to serve Kiwix binaries.
    It also serves ZIM files but this is intended only for other mirrors to sync.

    Please use https://lb.download.kiwix.org/zim/ instead to be redirected to the
    most appropriate mirror.

    Please consider downloading via torrents as this spread the bandwidth requirements
    over all the torrent peers.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: master-mirror-app
  name: master-mirror-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-mirror-app
  template:
    metadata:
      labels:
        app: master-mirror-app
    spec:
      shareProcessNamespace: true
      containers:
      - image: docker.io/library/bash:5-alpine3.15
        imagePullPolicy: IfNotPresent
        name: reloader
        # reload nginx config every hour at *:10
        command: ["crond", "-f"]
        securityContext:
          capabilities:
            add:
            - SYS_PTRACE
        volumeMounts:
        - name: nginx-configs-scripts
          mountPath: "/usr/bin/reload-nginx"
          subPath: reload-nginx.sh
          readOnly: true
        - name: nginx-configs-scripts
          mountPath: "/etc/crontabs/root"
          subPath: reload-nginx.crontab
          readOnly: true
      - image: docker.io/nginx:1.21
        imagePullPolicy: IfNotPresent
        name: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/var/www/zim"
          name: zim-volume
          readOnly: true
        - mountPath: "/var/www/release"
          name: kiwix-release-volume
          readOnly: true
        - mountPath: "/var/www/nightly"
          name: kiwix-nightly-volume
          readOnly: true
        - mountPath: "/var/log/nginx"
          subPath: mirror-download-kiwix
          name: nginx-logs-volume
          readOnly: false
        - name: configs
          mountPath: "/var/www/README"
          subPath: README
          readOnly: true
        - name: configs
          mountPath: "/var/www/mirrors.html"
          subPath: mirrors.html
          readOnly: true
        - name: configs
          mountPath: "/etc/nginx/conf.d/default.conf"
          subPath: vhost.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/mime.types"
          subPath: mime.types
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/gzip.conf"
          subPath: gzip.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/01vhost-logfmt.conf"
          subPath: vhost-logfmt.conf
          readOnly: true
        - mountPath: "/data/maps"
          name: maps-volume
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: zim-volume
        persistentVolumeClaim:
          claimName: master-zim-pvc
      - name: kiwix-release-volume
        persistentVolumeClaim:
          claimName: master-kiwix-release-pvc
      - name: kiwix-nightly-volume
        persistentVolumeClaim:
          claimName: master-kiwix-nightly-pvc
      - name: nginx-logs-volume
        persistentVolumeClaim:
          claimName: master-www-logs-pvc
      - name: configs
        configMap:
          name: master-mirror-configs
      - name: nginx-configs
        configMap:
          name: nginx-configs
      - name: maps-volume
        persistentVolumeClaim:
          claimName: master-maps-pvc
      - name: nginx-configs-scripts
        configMap:
          name: nginx-configs
          defaultMode: 0755
      nodeSelector:
        k8s.kiwix.org/role: "master"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: master-mirror-service
  labels:
    app: master-mirror-app
spec:
  selector:
    app: master-mirror-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master-mirror-ingress
  namespace: zim
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      # CORS for Kiwix-JS
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, User-Agent, Range" always;
      add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;
      add_header Access-Control-Allow-Credentials "true" always;

      # Frame ancestors for both sites
      add_header Content-Security-Policy "frame-ancestors 'self' https://browser-extension.kiwix.org https://pwa.kiwix.org https://kiwix.github.io http://localhost:*" always;

      # Handle preflight requests
      if ($request_method = 'OPTIONS') {
          return 204;
      }
      
      location /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /";
      }

      # redirect root and zim root to user-friendly page on Hub
      rewrite ^/zim/$  https://hub.kiwix.org/downloads/ permanent;
      # except the minibrain probe that should go through
      if ($http_user_agent !~ probe_info) {
        rewrite ^/$  https://hub.kiwix.org/downloads/ permanent;
      }
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - mirror.download.kiwix.org
      secretName: mirror-download-kiwix-org-tls
  rules:
  - host: mirror.download.kiwix.org
    http:
      paths:
      - path: /library/library_zim.xml
        pathType: Exact
        backend:
          service:
            name: obsolete-library-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: master-mirror-service
            port:
              number: 80
