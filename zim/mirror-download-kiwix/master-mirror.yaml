apiVersion: v1
kind: ConfigMap
metadata:
  name: master-mirror-configs
  namespace: zim
data:
  vhost.conf: |
    map_hash_max_size 2048;
    map_hash_bucket_size 256;
    map $uri $redirect_uri {
        include /data/maps/kiwix-releases.map;
        include /data/maps/kiwix-nightly.map;
    }

    server {
      listen 80;
      server_name _;
      access_log /var/log/nginx/access.log vhost;
      access_log /dev/stdout vhost;
      root /var/www;
      default_type application/octet-stream;
      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime off;

      gzip on;
      gzip_types
        application/atom+xml
        application/javascript
        application/x-javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/xml
        text/x-component;

      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }
      location = /README {
        types { } default_type "text/plain; charset=utf-8";
      }
      location = /mirrors.html {
        types { } default_type "text/html; charset=utf-8";
      }

      location /zim {
        autoindex off;
      }

      location / {
        if ($redirect_uri) {
          add_header Cache-Control "no-store, no-cache, must-revalidate";
          rewrite ^ https://$host$redirect_uri permanent;
        }
      } 
    }
  README: |
    mirror.download.kiwix.org: Kiwix's own download mirror.

    /!\ This mirror's main purpose is to serve Kiwix binaries.
    It also serves ZIM files but this is intended only for other mirrors to sync.

    Please use https://lb.download.kiwix.org/zim/ instead to be redirected to the
    most appropriate mirror.

    Please consider downloading via torrents as this spread the bandwidth requirements
    over all the torrent peers.
