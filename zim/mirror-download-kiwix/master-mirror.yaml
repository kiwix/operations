apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zim
  labels:
    app: master-mirror-app
  name: master-mirror-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: master-mirror-app
  template:
    metadata:
      labels:
        app: master-mirror-app
    spec:
      shareProcessNamespace: true
      containers:
      - image: docker.io/library/bash:5-alpine3.15
        imagePullPolicy: IfNotPresent
        name: reloader
        # reload nginx config every hour at *:10
        command: ["crond", "-f"]
        securityContext:
          capabilities:
            add:
            - SYS_PTRACE
        volumeMounts:
        - name: nginx-configs-scripts
          mountPath: "/usr/bin/reload-nginx"
          subPath: reload-nginx.sh
          readOnly: true
        - name: nginx-configs-scripts
          mountPath: "/etc/crontabs/root"
          subPath: reload-nginx.crontab
          readOnly: true
      - image: docker.io/nginx:1.21
        imagePullPolicy: IfNotPresent
        name: nginx
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/var/www/zim"
          name: zim-volume
          readOnly: true
        - mountPath: "/var/www/release"
          name: kiwix-release-volume
          readOnly: true
        - mountPath: "/var/www/nightly"
          name: kiwix-nightly-volume
          readOnly: true
        - mountPath: "/var/log/nginx"
          subPath: mirror-download-kiwix
          name: nginx-logs-volume
          readOnly: false
        - name: configs
          mountPath: "/var/www/README"
          subPath: README
          readOnly: true
        - name: configs
          mountPath: "/var/www/mirrors.html"
          subPath: mirrors.html
          readOnly: true
        - name: configs
          mountPath: "/etc/nginx/conf.d/default.conf"
          subPath: vhost.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/mime.types"
          subPath: mime.types
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/gzip.conf"
          subPath: gzip.conf
          readOnly: true
        - name: nginx-configs
          mountPath: "/etc/nginx/conf.d/01vhost-logfmt.conf"
          subPath: vhost-logfmt.conf
          readOnly: true
        - mountPath: "/data/maps"
          name: maps-volume
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: zim-volume
        persistentVolumeClaim:
          claimName: master-zim-pvc
      - name: kiwix-release-volume
        persistentVolumeClaim:
          claimName: master-kiwix-release-pvc
      - name: kiwix-nightly-volume
        persistentVolumeClaim:
          claimName: master-kiwix-nightly-pvc
      - name: nginx-logs-volume
        persistentVolumeClaim:
          claimName: master-www-logs-pvc
      - name: configs
        configMap:
          name: master-mirror-configs
      - name: nginx-configs
        configMap:
          name: nginx-configs
      - name: maps-volume
        persistentVolumeClaim:
          claimName: master-maps-pvc
      - name: nginx-configs-scripts
        configMap:
          name: nginx-configs
          defaultMode: 0755
      nodeSelector:
        k8s.kiwix.org/role: "master"
---
apiVersion: v1
kind: Service
metadata:
  namespace: zim
  name: master-mirror-service
  labels:
    app: master-mirror-app
spec:
  selector:
    app: master-mirror-app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: master-mirror-ingress
  namespace: zim
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/server-snippet: |
      # CORS for Kiwix-JS
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, User-Agent, Range" always;
      add_header Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges" always;
      add_header Access-Control-Allow-Credentials "true" always;

      # Frame ancestors for both sites
      add_header Content-Security-Policy "frame-ancestors 'self' https://browser-extension.kiwix.org https://pwa.kiwix.org https://kiwix.github.io http://localhost:*" always;

      # Handle preflight requests
      if ($request_method = 'OPTIONS') {
          return 204;
      }
      
      location /robots.txt {
        add_header Content-Type "text/plain";
        return 200 "User-agent: *\nDisallow: /";
      }

      rewrite ^/zim/$  https://hub.kiwix.org/downloads/ permanent;
      rewrite ^/$  https://hub.kiwix.org/downloads/ permanent;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - mirror.download.kiwix.org
      secretName: mirror-download-kiwix-org-tls
  rules:
  - host: mirror.download.kiwix.org
    http:
      paths:
      - path: /library/library_zim.xml
        pathType: Exact
        backend:
          service:
            name: obsolete-library-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: master-mirror-service
            port:
              number: 80
