
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sync-prod-zim-from-browser-to-master
  namespace: zim
spec:
  schedule: "10 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: debian
              image: ghcr.io/kiwix/maintenance:latest
              imagePullPolicy: Always
              volumeMounts:
              - mountPath: "/data/zim"
                name: zim-volume
                readOnly: false
              args: ["rsync", "--verbose", "--compress", "--recursive", "--links", "--perms", "--times", "--devices", "--specials", "--delete", "--progress", "internal-rsyncd-service::zim/", "/data/zim/"]
              resources:
                limits:
                  cpu: 1000m
                  memory: 512Mi
          volumes:
          - name: zim-volume
            persistentVolumeClaim:
              claimName: master-zim-pvc
          restartPolicy: Never
          nodeSelector:
            k8s.kiwix.org/role: "master"
