name: Library Check

on:
  schedule:
    - cron: "0 8 * * *"
  push:
    branches:
      - main

jobs:

  opds:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
          architecture: x64
      - name: Install dependencies
        run: pip install -r test-suite/requirements.txt
      - name: Test opds.library.kiwix.org
        working-directory: test-suite
        run: pytest -vvv -m "not browse" test_library.py

  old-library:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
          architecture: x64
      - name: Install dependencies
        run: pip install -r test-suite/requirements.txt
      - name: Test library.kiwix.org
        working-directory: test-suite
        env:
          LIBRARY_HOST: library.kiwix.org
        run: pytest -vvv test_library.py

  staging-library:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11
          architecture: x64
      - name: Install dependencies
        run: pip install -r test-suite/requirements.txt
      - name: Test staging.library.kiwix.org
        working-directory: test-suite
        env:
          SCHEMES: http,https
          LIBRARY_HOST: staging.library.kiwix.org
          TIMEOUT: 30
        run: pytest -vvv -m "not varnish" test_library.py
